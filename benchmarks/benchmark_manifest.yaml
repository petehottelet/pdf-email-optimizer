# Targets are deliberately set below each fixture's natural size so the
# image-recompression ladder and render QA actually engage. Fixtures are
# generated by benchmarks/make_fixtures.py (CC0, synthetic).
cases:
  - id: photo_brochure
    input: benchmarks/fixtures/photo_brochure.pdf
    target_mb: 0.6
    profile: quality
    expected_behavior: hit_target_or_warn
  - id: indesign_export
    input: benchmarks/fixtures/indesign_export.pdf
    target_mb: 1.0
    profile: balanced
    expected_behavior: hit_target_or_warn
  - id: illustrator_export
    input: benchmarks/fixtures/illustrator_export.pdf
    target_mb: 7
    profile: balanced
    expected_behavior: preserve_vectors
  - id: creator_metadata
    input: benchmarks/fixtures/creator_metadata.pdf
    target_mb: 7
    profile: quality
    expected_behavior: structural_cleanup
  - id: screenshot_report
    input: benchmarks/fixtures/screenshot_report.pdf
    target_mb: 0.2
    profile: quality
    expected_behavior: protect_screenshots
  - id: text_vector_document
    input: benchmarks/fixtures/text_vector_document.pdf
    target_mb: 7
    profile: balanced
    expected_behavior: preserve_vectors
  - id: scanned_pdf
    input: benchmarks/fixtures/scanned_pdf.pdf
    target_mb: 0.4
    profile: balanced
    expected_behavior: image_recompress
  - id: mixed_transparency
    input: benchmarks/fixtures/mixed_transparency.pdf
    target_mb: 1.0
    profile: quality
    expected_behavior: warn_transparency
  - id: embedded_metadata
    input: benchmarks/fixtures/embedded_metadata.pdf
    target_mb: 7
    profile: balanced
    expected_behavior: strip_metadata
  - id: repeated_images
    input: benchmarks/fixtures/repeated_images.pdf
    target_mb: 0.5
    profile: balanced
    expected_behavior: dedupe_objects
  - id: forms_annotations
    input: benchmarks/fixtures/forms_annotations.pdf
    target_mb: 7
    profile: quality
    expected_behavior: warn_forms_annotations
