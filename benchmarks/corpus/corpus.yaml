# Real-world benchmark corpus manifest.
#
# The synthetic, CC0 fixtures generated by benchmarks/make_fixtures.py are the
# reproducible public corpus. Each entry below cites the on-disk path, license,
# category, and expected behavior so the corpus can be audited at a glance.
#
# Sample documents that live outside the repo (because they are too large or
# came from sample-data exports) are documented under benchmarks/run_samples.py
# and rendered into docs/gallery/ + benchmarks/results/samples.json. They are
# documented here under "external_samples" for completeness without committing
# the binaries.
fixtures:
  - id: photo_brochure
    path: benchmarks/fixtures/photo_brochure.pdf
    category: photo_heavy
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Photographic raster pages with strong JPEG headroom."
    target_mb: 0.6
    profile: quality
    expected_behavior: hit_target_or_warn

  - id: indesign_export
    path: benchmarks/fixtures/indesign_export.pdf
    category: design_export
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Mixed text + placed photos + rules (InDesign-style export)."
    target_mb: 1.0
    profile: balanced
    expected_behavior: hit_target_or_warn

  - id: illustrator_export
    path: benchmarks/fixtures/illustrator_export.pdf
    category: vector_heavy
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Heavy CMYK vector art (Illustrator-style export)."
    target_mb: 7
    profile: balanced
    expected_behavior: preserve_vectors

  - id: creator_metadata
    path: benchmarks/fixtures/creator_metadata.pdf
    category: metadata_cleanup
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Carries /PieceInfo and /LastModified creator-tool entries that structural cleanup safely drops."
    target_mb: 7
    profile: quality
    expected_behavior: structural_cleanup

  - id: screenshot_report
    path: benchmarks/fixtures/screenshot_report.pdf
    category: screenshot_heavy
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Sharp UI/screenshot content that must not be JPEG'd."
    target_mb: 0.2
    profile: quality
    expected_behavior: protect_screenshots

  - id: text_vector_document
    path: benchmarks/fixtures/text_vector_document.pdf
    category: text_vector
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Pure vector text; should be preserved losslessly."
    target_mb: 7
    profile: balanced
    expected_behavior: preserve_vectors

  - id: scanned_pdf
    path: benchmarks/fixtures/scanned_pdf.pdf
    category: scanned
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Grayscale scan-like pages."
    target_mb: 0.4
    profile: balanced
    expected_behavior: image_recompress

  - id: mixed_transparency
    path: benchmarks/fixtures/mixed_transparency.pdf
    category: transparency
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Alpha images + /ExtGState blend; transparency warnings."
    target_mb: 1.0
    profile: quality
    expected_behavior: warn_transparency

  - id: embedded_metadata
    path: benchmarks/fixtures/embedded_metadata.pdf
    category: metadata_cleanup
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Document metadata stripping."
    target_mb: 7
    profile: balanced
    expected_behavior: strip_metadata

  - id: repeated_images
    path: benchmarks/fixtures/repeated_images.pdf
    category: dedupe
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "Same image placed on many pages; lossless dedupe."
    target_mb: 0.5
    profile: balanced
    expected_behavior: dedupe_objects

  - id: forms_annotations
    path: benchmarks/fixtures/forms_annotations.pdf
    category: forms
    license: "CC0 / generated by benchmarks/make_fixtures.py"
    description: "AcroForm fields + annotations; form/annotation warnings."
    target_mb: 7
    profile: quality
    expected_behavior: warn_forms_annotations

# Larger sample documents that live outside the repo. They are processed by
# benchmarks/run_samples.py and visualized in docs/gallery + docs/charts.
external_samples:
  - id: travel_contact_sheet
    category: photo_heavy
    license: "Sample data, redistributed by maintainer"
    description: "139 MB travel contact sheet, full-bleed photographs."
    target_mb: 7
    profile: balanced
    expected_behavior: hit_target_or_warn
    source: "00_project_files/Sample Documents/travel_adventure_contact_sheet_source.pdf"

  - id: lossless_huge
    category: lossless_images
    license: "Sample data, redistributed by maintainer"
    description: "71 MB PDF saved with lossless image encoding."
    target_mb: 7
    profile: balanced
    expected_behavior: hit_target_or_warn
    source: "00_project_files/Sample Documents/sample_lossless_huge.pdf"

  - id: our_bank_deck
    category: design_export
    license: "Sample data, redistributed by maintainer"
    description: "Design-tool marketing slide deck."
    target_mb: 5
    profile: quality
    expected_behavior: hit_target_or_warn
    source: "00_project_files/Sample Documents/[Light] Our Bank.pptx"

  - id: financial_deck
    category: screenshot_heavy
    license: "Sample data, redistributed by maintainer"
    description: "Screenshot-heavy business deck."
    target_mb: 2.5
    profile: quality
    expected_behavior: protect_screenshots
    source: "00_project_files/Sample Documents/Financial Deck Proposal [main file].pptx"

  - id: quarterly_xlsx
    category: text_vector
    license: "Sample data, redistributed by maintainer"
    description: "Spreadsheet export with text + vector content."
    target_mb: 1.5
    profile: balanced
    expected_behavior: preserve_vectors
    source: "00_project_files/Sample Documents/WFS_Quarterly_Report_and_Financial_Model.xlsx"
